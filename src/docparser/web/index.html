<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Document Parser</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --panel-strong: #111827;
        --text: #172033;
        --muted: #5b6475;
        --line: #d7dde8;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --success: #166534;
        --code: #eef2f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        color: var(--panel-strong);
        font-size: 30px;
        line-height: 1.15;
        font-weight: 720;
      }

      .health {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .health-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #9ca3af;
      }

      .health[data-state="ok"] .health-dot {
        background: var(--success);
      }

      .health[data-state="error"] .health-dot {
        background: var(--danger);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        color: var(--panel-strong);
        font-size: 17px;
        line-height: 1.3;
      }

      .panel-body {
        padding: 20px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      input[type="file"],
      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
      }

      input[type="file"],
      input[type="text"] {
        min-height: 42px;
      }

      input[type="text"] {
        padding: 0 12px;
      }

      input[type="file"] {
        padding: 8px;
      }

      textarea {
        min-height: 260px;
        padding: 12px;
        resize: vertical;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .viewer-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        border-color: var(--line);
        background: #fff;
        color: var(--text);
      }

      button.viewer-tab {
        min-height: 34px;
        border-color: var(--line);
        background: #fff;
        color: var(--muted);
        font-size: 13px;
      }

      button.viewer-tab.active {
        border-color: var(--accent);
        background: #ecfdf5;
        color: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .status-line {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
      }

      .status-line.error {
        color: var(--danger);
      }

      .status-line.success {
        color: var(--success);
      }

      .result-grid {
        display: grid;
        gap: 14px;
      }

      .metric-row {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 30px;
        border-bottom: 1px solid #edf0f5;
        padding-bottom: 10px;
      }

      .metric-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-value {
        overflow-wrap: anywhere;
        color: var(--text);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
      }

      pre {
        min-height: 240px;
        max-height: 520px;
        overflow: auto;
        margin: 0;
        padding: 16px;
        border-radius: 6px;
        background: var(--code);
        color: #1f2937;
        font-size: 13px;
        line-height: 1.55;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 20px, 1120px);
          padding: 18px 0;
        }

        header,
        .workspace {
          display: grid;
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 25px;
        }

        .metric-row {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .viewer-tabs {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>PDF Document Parser</h1>
        <div class="health" id="health" data-state="checking">
          <span class="health-dot" aria-hidden="true"></span>
          <span id="health-text">检查服务</span>
        </div>
      </header>

      <div class="workspace">
        <section aria-labelledby="upload-title">
          <div class="panel-head">
            <h2 id="upload-title">上传 PDF</h2>
          </div>
          <div class="panel-body">
            <form id="upload-form">
              <label>
                文件
                <input id="pdf-file" name="file" type="file" accept="application/pdf,.pdf" required />
              </label>
              <div class="actions">
                <button class="primary" id="upload-button" type="submit">上传</button>
                <button class="secondary" id="reset-button" type="button">清空</button>
              </div>
              <div class="status-line" id="upload-status" role="status"></div>
            </form>
          </div>
        </section>

        <section aria-labelledby="task-title">
          <div class="panel-head">
            <h2 id="task-title">任务状态</h2>
          </div>
          <div class="panel-body">
            <form id="task-form">
              <label>
                Task ID
                <input id="task-id" type="text" autocomplete="off" />
              </label>
              <div class="actions">
                <button class="primary" id="refresh-button" type="submit">刷新</button>
              </div>
              <div class="status-line" id="task-status" role="status"></div>
            </form>
          </div>
        </section>

        <section aria-labelledby="summary-title">
          <div class="panel-head">
            <h2 id="summary-title">摘要</h2>
          </div>
          <div class="panel-body">
            <div class="result-grid">
              <div class="metric-row">
                <div class="metric-label">Document ID</div>
                <div class="metric-value" id="document-id">-</div>
              </div>
              <div class="metric-row">
                <div class="metric-label">Task ID</div>
                <div class="metric-value" id="summary-task-id">-</div>
              </div>
              <div class="metric-row">
                <div class="metric-label">Status</div>
                <div class="metric-value" id="summary-status">-</div>
              </div>
              <div class="metric-row">
                <div class="metric-label">Progress</div>
                <div class="metric-value" id="summary-progress">-</div>
              </div>
            </div>
          </div>
        </section>

        <section aria-labelledby="schema-title">
          <div class="panel-head">
            <h2 id="schema-title">字段抽取</h2>
          </div>
          <div class="panel-body">
            <form id="schema-form">
              <label>
                Schema JSON
                <textarea id="schema-json" spellcheck="false"></textarea>
              </label>
              <div class="actions">
                <button class="primary" id="save-schema-button" type="submit">保存 Schema</button>
                <button class="secondary" id="extract-button" type="button">抽取字段</button>
              </div>
              <div class="status-line" id="schema-status" role="status"></div>
            </form>
          </div>
        </section>

        <section aria-labelledby="raw-title">
          <div class="panel-head">
            <h2 id="raw-title">解析结果</h2>
            <div class="viewer-tabs" role="tablist" aria-label="解析结果视图">
              <button class="viewer-tab active" type="button" data-view="merged" role="tab" aria-selected="true">
                合并结果
              </button>
              <button class="viewer-tab" type="button" data-view="pymupdf" role="tab" aria-selected="false">
                PyMuPDF 原始
              </button>
              <button class="viewer-tab" type="button" data-view="mineru" role="tab" aria-selected="false">
                MinerU 原始
              </button>
              <button class="viewer-tab" type="button" data-view="response" role="tab" aria-selected="false">
                当前响应
              </button>
            </div>
          </div>
          <pre id="raw-output">{}</pre>
        </section>
      </div>
    </main>

    <script>
      const uploadForm = document.querySelector("#upload-form");
      const taskForm = document.querySelector("#task-form");
      const uploadButton = document.querySelector("#upload-button");
      const refreshButton = document.querySelector("#refresh-button");
      const resetButton = document.querySelector("#reset-button");
      const schemaForm = document.querySelector("#schema-form");
      const schemaInput = document.querySelector("#schema-json");
      const saveSchemaButton = document.querySelector("#save-schema-button");
      const extractButton = document.querySelector("#extract-button");
      const fileInput = document.querySelector("#pdf-file");
      const taskInput = document.querySelector("#task-id");
      const uploadStatus = document.querySelector("#upload-status");
      const taskStatus = document.querySelector("#task-status");
      const schemaStatus = document.querySelector("#schema-status");
      const rawOutput = document.querySelector("#raw-output");
      const viewButtons = [...document.querySelectorAll("[data-view]")];
      const health = document.querySelector("#health");
      const healthText = document.querySelector("#health-text");
      let currentDocumentId = "";
      let currentSchemaId = "contract_v1";
      let currentParseResult = {};
      let currentResponse = {};
      let activeView = "merged";

      const fields = {
        documentId: document.querySelector("#document-id"),
        taskId: document.querySelector("#summary-task-id"),
        status: document.querySelector("#summary-status"),
        progress: document.querySelector("#summary-progress"),
      };

      function setLine(element, message, state = "") {
        element.textContent = message;
        element.className = `status-line ${state}`.trim();
      }

      function mergedParseResult(payload) {
        if (!payload || !Object.keys(payload).length) {
          return {};
        }
        const merged = { ...payload };
        delete merged.engine_results;
        return merged;
      }

      function payloadForView(view) {
        if (view === "merged") {
          return mergedParseResult(currentParseResult);
        }
        if (view === "pymupdf") {
          return currentParseResult.engine_results?.pymupdf || {};
        }
        if (view === "mineru") {
          return currentParseResult.engine_results?.mineru || {};
        }
        return currentResponse;
      }

      function renderViewer() {
        rawOutput.textContent = JSON.stringify(payloadForView(activeView), null, 2);
      }

      function setActiveView(view) {
        activeView = view;
        for (const button of viewButtons) {
          const selected = button.dataset.view === view;
          button.classList.toggle("active", selected);
          button.setAttribute("aria-selected", String(selected));
        }
        renderViewer();
      }

      function showResponse(payload, activate = true) {
        currentResponse = payload;
        if (activate) {
          setActiveView("response");
        } else {
          renderViewer();
        }
      }

      function showRaw(payload) {
        showResponse(payload);
      }

      function showParseResult(payload) {
        currentParseResult = payload;
        setActiveView("merged");
      }

      function updateSummary(payload) {
        if (payload.document_id) {
          currentDocumentId = payload.document_id;
        }
        fields.documentId.textContent = payload.document_id || "-";
        fields.taskId.textContent = payload.task_id || "-";
        fields.status.textContent = payload.status || "-";
        fields.progress.textContent = payload.progress ?? "-";
      }

      async function readJson(response) {
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = payload.detail || {};
          const message = detail.message || response.statusText || "Request failed";
          throw Object.assign(new Error(message), { payload });
        }
        return payload;
      }

      async function checkHealth() {
        try {
          const response = await fetch("/health");
          const payload = await readJson(response);
          health.dataset.state = payload.status === "ok" ? "ok" : "error";
          healthText.textContent = payload.status === "ok" ? "服务可用" : "服务异常";
        } catch (error) {
          health.dataset.state = "error";
          healthText.textContent = "服务不可用";
        }
      }

      uploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!fileInput.files.length) {
          setLine(uploadStatus, "请选择 PDF 文件", "error");
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        uploadButton.disabled = true;
        setLine(uploadStatus, "上传中");

        try {
          const response = await fetch("/documents", {
            method: "POST",
            body: formData,
          });
          const payload = await readJson(response);
          currentSchemaId = payload.schema_id || currentSchemaId;
          taskInput.value = payload.task_id || "";
          updateSummary(payload);
          showRaw(payload);
          setLine(uploadStatus, "上传完成", "success");
          if (payload.document_id) {
            await refreshParseResult(payload.document_id);
          } else if (payload.task_id) {
            await refreshTask(payload.task_id);
          }
        } catch (error) {
          showRaw(error.payload || { error: error.message });
          setLine(uploadStatus, error.message, "error");
        } finally {
          uploadButton.disabled = false;
        }
      });

      async function refreshTask(taskId) {
        refreshButton.disabled = true;
        setLine(taskStatus, "刷新中");

        try {
          const response = await fetch(`/tasks/${encodeURIComponent(taskId)}`);
          const payload = await readJson(response);
          updateSummary(payload);
          showRaw(payload);
          setLine(taskStatus, "已刷新", "success");
        } catch (error) {
          showRaw(error.payload || { error: error.message });
          setLine(taskStatus, error.message, "error");
        } finally {
          refreshButton.disabled = false;
        }
      }

      async function refreshParseResult(documentId) {
        setLine(taskStatus, "加载解析结果");

        try {
          const response = await fetch(`/documents/${encodeURIComponent(documentId)}/parse-result`);
          const payload = await readJson(response);
          showParseResult(payload);
          setLine(taskStatus, "解析结果已加载", "success");
        } catch (error) {
          showRaw(error.payload || { error: error.message });
          setLine(taskStatus, error.message, "error");
        }
      }

      taskForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const taskId = taskInput.value.trim();
        if (!taskId) {
          setLine(taskStatus, "请输入 Task ID", "error");
          return;
        }
        await refreshTask(taskId);
      });

      resetButton.addEventListener("click", () => {
        uploadForm.reset();
        taskInput.value = "";
        currentDocumentId = "";
        currentParseResult = {};
        currentResponse = {};
        updateSummary({});
        setActiveView("merged");
        setLine(uploadStatus, "");
        setLine(taskStatus, "");
      });

      schemaInput.value = JSON.stringify(
        {
          schema_id: "contract_v1",
          name: "合同字段抽取",
          fields: [
            {
              name: "contract_no",
              label: "合同编号",
              type: "string",
              required: true,
              strategies: [
                {
                  type: "regex",
                  pattern: "合同编号[:：\\\\s]*([A-Za-z0-9\\\\-]+)",
                },
                {
                  type: "regex",
                  pattern: "Contract No[:：\\\\s]*([A-Za-z0-9\\\\-]+)",
                },
              ],
            },
          ],
        },
        null,
        2,
      );

      schemaForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const payload = await saveCurrentSchema();
          showRaw(payload);
          setLine(schemaStatus, "Schema 已保存", "success");
        } catch (error) {
          showRaw(error.payload || { error: error.message });
          setLine(schemaStatus, error.message, "error");
        }
      });

      async function saveCurrentSchema() {
        saveSchemaButton.disabled = true;
        setLine(schemaStatus, "保存中");
        try {
          const schema = JSON.parse(schemaInput.value);
          const response = await fetch("/schemas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(schema),
          });
          const payload = await readJson(response);
          currentSchemaId = payload.schema_id;
          return payload;
        } finally {
          saveSchemaButton.disabled = false;
        }
      }

      extractButton.addEventListener("click", async () => {
        if (!currentDocumentId) {
          setLine(schemaStatus, "请先上传 PDF", "error");
          return;
        }

        extractButton.disabled = true;
        setLine(schemaStatus, "抽取中");

        try {
          await saveCurrentSchema();
          const response = await fetch(`/documents/${encodeURIComponent(currentDocumentId)}/extract`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ schema_id: currentSchemaId }),
          });
          const payload = await readJson(response);
          const resultResponse = await fetch(`/extractions/${encodeURIComponent(payload.extraction_id)}`);
          const resultPayload = await readJson(resultResponse);
          showRaw(resultPayload);
          setLine(schemaStatus, "字段抽取完成", "success");
        } catch (error) {
          showRaw(error.payload || { error: error.message });
          setLine(schemaStatus, error.message, "error");
        } finally {
          extractButton.disabled = false;
        }
      });

      for (const button of viewButtons) {
        button.addEventListener("click", () => {
          setActiveView(button.dataset.view || "merged");
        });
      }

      checkHealth();
    </script>
  </body>
</html>

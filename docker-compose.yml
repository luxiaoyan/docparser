services:
  docparser:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      DOCPARSER_MINERU_COMMAND: ""
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
